name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" "cmake;3.22.1" "ndk;27.2.12479018"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Collect APK
        run: |
          mkdir -p github-apk-output
          cp app/build/outputs/apk/debug/*.apk github-apk-output/чЛЧщкищЕТщжЖ-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: чЛЧщкищЕТщжЖ-debug-apk
          path: github-apk-output/*.apk
